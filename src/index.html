<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Commander</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8eaf0;
    --text-muted: #5a6070;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TITLE BAR ── */
  .titlebar {
    height: 40px;
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .titlebar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .titlebar-sub {
    font-size: 11px;
    color: var(--text-muted);
  }
  .titlebar-controls {
    margin-left: auto;
    display: flex;
    gap: 8px;
    -webkit-app-region: no-drag;
  }
  .titlebar-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .titlebar-btn:hover { background: var(--surface2); color: var(--text); }
  .titlebar-btn.close:hover { background: var(--red); color: #fff; }

  /* panel count toggle (타이틀바) */
  .panel-count-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-app-region: no-drag;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .panel-count-toggle .pc-label {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 6px 0 4px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .count-btn {
    min-width: 24px;
    height: 22px;
    padding: 0 6px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .count-btn:hover { color: var(--text); }
  .count-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 320px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .panel-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .todo-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .todo-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: none;
    height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  .todo-textarea::placeholder { color: var(--text-muted); }
  .todo-textarea:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #7c75ff; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); background: #22263a; }

  /* classify mode toggle */
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .mode-btn {
    flex: 1;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── RESULT LIST ── */
  .result-section {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 20px;
  }
  .result-section::-webkit-scrollbar { width: 4px; }
  .result-section::-webkit-scrollbar-track { background: transparent; }
  .result-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .category-group {
    margin-bottom: 16px;
  }
  .category-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .cat-ai { color: var(--green); background: rgba(34,197,94,0.08); }
  .cat-assist { color: var(--yellow); background: rgba(245,158,11,0.08); }
  .cat-human { color: var(--red); background: rgba(239,68,68,0.08); }

  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    cursor: default;
    transition: all 0.15s;
  }
  .task-item:hover { border-color: rgba(108,99,255,0.3); }
  .task-text {
    flex: 1;
    font-size: 12px;
    line-height: 1.4;
    color: var(--text);
  }
  .task-send-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-send-btn { opacity: 1; }
  .cat-human .task-send-btn, .task-item.no-send .task-send-btn { display: none; }

  /* send target selector */
  .send-target {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .task-item:hover .send-target { opacity: 1; }
  .send-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    color: var(--text-muted);
    font-weight: 700;
  }
  .send-icon:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 28px; margin-bottom: 10px; }

  /* loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 10px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .ai-panels {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }
  .ai-panels.grid-2x2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }

  .ai-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .ai-pane-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .ai-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .ai-select:hover, .ai-select:focus { border-color: var(--accent); }
  .ai-select option { background: var(--surface2); }

  .pane-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .ai-webview-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  webview {
    width: 100%;
    height: 100%;
    display: flex;
    border: none;
  }

  .webview-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .webview-placeholder .ph-icon { font-size: 36px; }
  .webview-placeholder .ph-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* AI color dots */
  .ai-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- TITLE BAR -->
<div class="titlebar">
  <span class="titlebar-logo">AI Commander</span>
  <span class="titlebar-sub">업무 분류 + 멀티 AI 뷰어</span>
  <div class="panel-count-toggle">
    <span class="pc-label">패널</span>
    <button class="count-btn" data-count="2" onclick="setPanelCount(2)">2</button>
    <button class="count-btn active" data-count="3" onclick="setPanelCount(3)">3</button>
    <button class="count-btn" data-count="4" onclick="setPanelCount(4)">4</button>
  </div>
  <div class="titlebar-controls">
    <button class="titlebar-btn" onclick="window.electronAPI.minimize()">─</button>
    <button class="titlebar-btn" onclick="window.electronAPI.maximize()">□</button>
    <button class="titlebar-btn close" onclick="window.electronAPI.close()">✕</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: 업무 분류 패널 -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">업무 분류기</div>
      <div class="panel-desc">To-do를 입력하면 AI 적합도를 3단계로 분류해드려요</div>
    </div>

    <div class="todo-section">
      <!-- 분류 방식 선택 -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeRule" onclick="setMode('rule')">⚡ 즉시 분류</button>
        <button class="mode-btn" id="modeAI" onclick="setMode('ai')">🤖 AI에게 물어보기</button>
      </div>

      <textarea class="todo-textarea" id="todoInput"
        placeholder="할 일을 한 줄씩 입력하세요&#10;&#10;예)&#10;이메일 초안 작성하기&#10;팀 미팅 일정 조율&#10;월간 보고서 데이터 요약&#10;클라이언트와 협상하기"></textarea>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="classify()">✦ 분류하기</button>
        <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
      </div>
    </div>

    <div class="result-section" id="resultSection">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div>할 일을 입력하고<br>분류하기를 눌러주세요</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: AI 뷰어 패널 -->
  <div class="right-panel">
    <div class="ai-panels" id="aiPanels">
      <!-- 3개 패널 동적 생성 -->
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── AI 설정 ──────────────────────────────────────────
const AI_LIST = {
  claude:     { name: 'Claude',     url: 'https://claude.ai',           color: '#cc785c', icon: '◈' },
  chatgpt:    { name: 'ChatGPT',    url: 'https://chatgpt.com',         color: '#19c37d', icon: '✦' },
  perplexity: { name: 'Perplexity', url: 'https://perplexity.ai',       color: '#6c8eff', icon: '◎' },
  gemini:     { name: 'Gemini',     url: 'https://gemini.google.com',   color: '#4285f4', icon: '✧' },
};

// 패널별 선택된 AI (패널 수에 따라 동적으로 늘어남/줄어듦)
let paneSelections = ['claude', 'chatgpt', 'perplexity'];
// 패널 수를 늘릴 때 새 패널에 우선 할당할 기본 AI 순서
const PANE_SEED_ORDER = ['claude', 'chatgpt', 'perplexity', 'gemini'];
let classifyMode = 'rule';

// ── 분류 모드 ──────────────────────────────────────────
function setMode(mode) {
  classifyMode = mode;
  document.getElementById('modeRule').classList.toggle('active', mode === 'rule');
  document.getElementById('modeAI').classList.toggle('active', mode === 'ai');
}

// ── 규칙 기반 분류 ──────────────────────────────────────
const AI_KEYWORDS = [
  '요약','번역','초안','작성','정리','검색','데이터','분석','코드','코딩',
  '이메일','문서','보고서','리스트','표','아이디어','브레인스토밍','조사',
  '일정','계획','템플릿','편집','교정','수정','답변','설명','비교',
  'summary','translate','draft','write','code','report','email',
];
const HUMAN_KEYWORDS = [
  '협상','설득','감정','공감','신뢰','관계','면담','면접','결정','판단',
  '책임','윤리','비밀','개인','사과','위로','격려','갈등','해고','채용',
  '계약','법적','소송','의료','진단','상담','투자결정','협력','네트워킹',
];

function ruleClassify(task) {
  const t = task.toLowerCase();
  const humanScore = HUMAN_KEYWORDS.filter(k => t.includes(k)).length;
  const aiScore    = AI_KEYWORDS.filter(k => t.includes(k)).length;

  if (humanScore > 0 && aiScore === 0) return 'human';
  if (aiScore > 0 && humanScore === 0) return 'ai';
  if (humanScore > aiScore) return 'human';
  if (aiScore > humanScore) return 'ai';
  // 중간 케이스
  if (task.length > 20) return 'assist';
  return 'assist';
}

// ── AI 프롬프트 분류 (클립보드 방식) ──────────────────
const AI_CLASSIFY_PROMPT = (tasks) => `당신은 업무 분류 전문가입니다. 아래 할 일 목록을 분석해서 각 항목을 3가지 카테고리로 분류해주세요.

카테고리:
🟢 AI_GOOD: AI가 잘하는 일 (검색, 요약, 초안 작성, 데이터 정리, 코드 작성, 번역 등 반복적·정보 처리형)
🟡 AI_ASSIST: AI의 도움을 받아야 하는 일 (판단이 필요하지만 AI가 초안/아이디어를 제공할 수 있는 일)
🔴 HUMAN_ONLY: 사람이 직접 해야 하는 일 (대인관계, 감정, 협상, 최종 결정, 책임이 필요한 일)

할 일 목록:
${tasks.map((t, i) => `${i+1}. ${t}`).join('\n')}

응답 형식 (반드시 이 형식으로만):
AI_GOOD: 번호,번호,...
AI_ASSIST: 번호,번호,...
HUMAN_ONLY: 번호,번호,...`;

// ── 분류 실행 ──────────────────────────────────────────
async function classify() {
  const raw = document.getElementById('todoInput').value.trim();
  if (!raw) { showToast('할 일을 먼저 입력해주세요 🙂'); return; }

  const tasks = raw.split('\n').map(t => t.trim()).filter(Boolean);
  if (tasks.length === 0) return;

  const rs = document.getElementById('resultSection');

  if (classifyMode === 'rule') {
    // 즉시 분류
    const groups = { ai: [], assist: [], human: [] };
    tasks.forEach((t, i) => {
      const cat = ruleClassify(t);
      groups[cat].push({ text: t, idx: i });
    });
    renderResults(groups, tasks);

  } else {
    // AI 채팅창 붙여넣기 모드
    const prompt = AI_CLASSIFY_PROMPT(tasks);
    await window.electronAPI.copyToClipboard(prompt);

    rs.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <span>프롬프트가 클립보드에 복사되었어요!</span>
      </div>
      <div style="padding: 10px; font-size: 12px; color: var(--text-muted); line-height: 1.7; background: var(--surface2); border-radius: 8px; margin-top: 8px;">
        👉 오른쪽 AI 창에서<br>
        <strong style="color: var(--text)">Ctrl+V</strong> 로 붙여넣기 후 전송하세요.<br><br>
        AI가 응답하면 아래 버튼으로 결과를 붙여넣어 자동 분류합니다.
      </div>
      <textarea id="aiResponseInput" class="todo-textarea" style="margin-top:12px;height:120px;"
        placeholder="AI 응답을 여기에 붙여넣으세요..."></textarea>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-primary" onclick="parseAIResponse(${JSON.stringify(tasks).replace(/"/g, '&quot;')})">✦ 분류 적용</button>
      </div>`;
    showToast('프롬프트 복사 완료! AI 창에 붙여넣기 하세요 📋');
  }
}

function parseAIResponse(tasks) {
  const raw = document.getElementById('aiResponseInput')?.value || '';
  const groups = { ai: [], assist: [], human: [] };

  const parseNums = (line) => {
    const m = line.match(/[\d,\s]+/);
    if (!m) return [];
    return m[0].split(',').map(n => parseInt(n.trim()) - 1).filter(n => !isNaN(n));
  };

  raw.split('\n').forEach(line => {
    if (line.includes('AI_GOOD:'))    parseNums(line).forEach(i => tasks[i] && groups.ai.push({ text: tasks[i], idx: i }));
    if (line.includes('AI_ASSIST:'))  parseNums(line).forEach(i => tasks[i] && groups.assist.push({ text: tasks[i], idx: i }));
    if (line.includes('HUMAN_ONLY:')) parseNums(line).forEach(i => tasks[i] && groups.human.push({ text: tasks[i], idx: i }));
  });

  // 미분류는 assist로
  const classified = [...groups.ai, ...groups.assist, ...groups.human].map(t => t.idx);
  tasks.forEach((t, i) => { if (!classified.includes(i)) groups.assist.push({ text: t, idx: i }); });

  renderResults(groups, tasks);
}

function renderResults(groups, tasks) {
  const rs = document.getElementById('resultSection');
  const catConfig = [
    { key: 'ai',     label: '🟢 AI가 잘하는 일',          cls: 'cat-ai',     canSend: true  },
    { key: 'assist', label: '🟡 AI 도움을 받으면 좋은 일', cls: 'cat-assist', canSend: true  },
    { key: 'human',  label: '🔴 사람이 직접 해야 하는 일', cls: 'cat-human',  canSend: false },
  ];

  let html = '';
  catConfig.forEach(cat => {
    const items = groups[cat.key];
    if (items.length === 0) return;
    html += `<div class="category-group">
      <div class="category-label ${cat.cls}">${cat.label} <span style="margin-left:auto;font-weight:400;letter-spacing:0;">${items.length}개</span></div>`;

    items.forEach(item => {
      html += `<div class="task-item${cat.canSend ? '' : ' no-send'}">
        <div class="task-text">${escHtml(item.text)}</div>`;

      if (cat.canSend) {
        html += `<div class="send-target">`;
        Object.entries(AI_LIST).forEach(([key, ai]) => {
          html += `<div class="send-icon" title="${ai.name}에 전송"
            style="color:${ai.color}; border-color: ${ai.color}33;"
            onclick="sendToPane('${escHtml(item.text)}', '${key}')">${ai.icon}</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });

    html += `</div>`;
  });

  if (!html) {
    html = `<div class="empty-state"><div class="empty-icon">🤔</div><div>분류 결과가 없어요</div></div>`;
  }

  rs.innerHTML = html;
}

// ── AI 창으로 전송 ──────────────────────────────────────
function sendToPane(text, preferAI) {
  // preferAI가 현재 패널에 있으면 그 패널로, 아니면 패널 0으로
  let paneIdx = paneSelections.indexOf(preferAI);
  if (paneIdx === -1) paneIdx = 0;

  const webview = document.querySelectorAll('webview')[paneIdx];
  if (!webview) { showToast('AI 패널을 먼저 열어주세요'); return; }

  const aiKey = paneSelections[paneIdx];
  const ai = AI_LIST[aiKey];

  // 클립보드에 복사 후 안내
  window.electronAPI.copyToClipboard(text).then(() => {
    showToast(`📋 "${text.slice(0,20)}..." 클립보드 복사! ${ai.name} 창에 Ctrl+V`);
  });

  // 해당 패널 하이라이트
  highlightPane(paneIdx);
}

function highlightPane(idx) {
  const panes = document.querySelectorAll('.ai-pane');
  panes.forEach((p, i) => {
    p.style.outline = i === idx ? '2px solid var(--accent)' : '';
  });
  setTimeout(() => panes.forEach(p => p.style.outline = ''), 2000);
}

// ── 패널 생성 ──────────────────────────────────────────
function createPane(idx) {
  const aiKey = paneSelections[idx];
  const ai = AI_LIST[aiKey];
  const pane = document.createElement('div');
  pane.className = 'ai-pane';
  pane.id = `pane-${idx}`;

  // 셀렉트 옵션
  const opts = Object.entries(AI_LIST).map(([k, a]) =>
    `<option value="${k}" ${k === aiKey ? 'selected' : ''}>${a.icon} ${a.name}</option>`
  ).join('');

  pane.innerHTML = `
    <div class="ai-pane-header">
      <div class="ai-dot" style="background:${ai.color}"></div>
      <select class="ai-select" onchange="changeAI(${idx}, this.value)">${opts}</select>
      <div class="pane-actions">
        <button class="icon-btn" title="새로고침" onclick="reloadPane(${idx})">↺</button>
        <button class="icon-btn" title="홈으로" onclick="homePane(${idx})">⌂</button>
      </div>
    </div>
    <div class="ai-webview-wrap">
      <webview id="webview-${idx}" src="${ai.url}"
        partition="persist:ai${idx}"
        useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
        allowpopups
        style="width:100%;height:100%;border:none;">
      </webview>
    </div>`;
  return pane;
}

function buildPanels() {
  const container = document.getElementById('aiPanels');
  container.innerHTML = '';
  for (let idx = 0; idx < paneSelections.length; idx++) {
    container.appendChild(createPane(idx));
  }
}

// ── 패널 수 변경 (2/3/4) ────────────────────────────────
function setPanelCount(n) {
  if (n === paneSelections.length) return;

  if (n > paneSelections.length) {
    // 늘리기: 현재 사용되지 않은 AI를 시드 순서대로 채움
    const used = new Set(paneSelections);
    const candidates = PANE_SEED_ORDER.filter(k => !used.has(k));
    while (paneSelections.length < n) {
      paneSelections.push(candidates.shift() || 'claude');
    }
  } else {
    // 줄이기: 뒤쪽 패널부터 제거
    paneSelections = paneSelections.slice(0, n);
  }

  // 증분 업데이트: 앞쪽 패널은 webview를 재생성하지 않음 (세션/로그인 유지, 리로드 방지)
  const container = document.getElementById('aiPanels');
  while (container.children.length > paneSelections.length) {
    container.removeChild(container.lastChild);
  }
  for (let idx = container.children.length; idx < paneSelections.length; idx++) {
    container.appendChild(createPane(idx));
  }

  // 4분할: 2x2 그리드, 나머지: 가로 분할
  container.classList.toggle('grid-2x2', paneSelections.length === 4);

  // 타이틀바 버튼 active 갱신
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.count) === paneSelections.length);
  });

  showToast(`AI 패널 ${paneSelections.length}개로 변경`);
}

function changeAI(idx, newKey) {
  paneSelections[idx] = newKey;
  const ai = AI_LIST[newKey];
  const webview = document.getElementById(`webview-${idx}`);
  const dot = document.querySelector(`#pane-${idx} .ai-dot`);
  if (webview) webview.src = ai.url;
  if (dot) dot.style.background = ai.color;
}

function reloadPane(idx) {
  document.getElementById(`webview-${idx}`)?.reload();
}

function homePane(idx) {
  const ai = AI_LIST[paneSelections[idx]];
  const wv = document.getElementById(`webview-${idx}`);
  if (wv) wv.src = ai.url;
}

function clearAll() {
  document.getElementById('todoInput').value = '';
  document.getElementById('resultSection').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">✦</div>
      <div>할 일을 입력하고<br>분류하기를 눌러주세요</div>
    </div>`;
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────
buildPanels();
</script>
</body>
</html>
